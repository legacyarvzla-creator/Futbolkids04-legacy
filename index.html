<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Legacy AR - ESTABLE</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #recording-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 70px; height: 70px; border-radius: 50%; background-color: #ff0000; border: 4px solid white; cursor: pointer; }
        #recording-btn.recording { background-color: #222; animation: pulse 1s infinite; border-color: #ff0000; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.9); } }
    </style>
</head>
<body>
    <button id="recording-btn"></button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" renderer="preserveDrawingBuffer: true;" vr-mode-ui="enabled: false">
        <a-assets>
            <video id="vid" src="video.mp4" loop="true" playsinline crossorigin="anonymous"></video>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1.777" scale="1.15 1.15 1"></a-video>
        </a-entity>
    </a-scene>

    <script>
        // Lógica simplificada: Clic para grabar
        const btn = document.getElementById("recording-btn");
        const video = document.getElementById("vid");
        let mediaRecorder, chunks = [], isRecording = false;

        btn.addEventListener("click", async () => {
            if (!isRecording) {
                // Iniciar grabación de canvas
                const canvas = document.querySelector("canvas.a-canvas");
                const stream = canvas.captureStream(24);
                
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(blob);
                    a.download = "Legacy_Record.webm";
                    a.click();
                    chunks = [];
                };
                
                mediaRecorder.start();
                btn.classList.add("recording");
                isRecording = true;
                video.play();
            } else {
                mediaRecorder.stop();
                btn.classList.remove("recording");
                isRecording = false;
            }
        });
    </script>
</body>
</html>
